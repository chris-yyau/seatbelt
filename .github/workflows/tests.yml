name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Run tests
        run: bash tests/run-tests.sh

  shellcheck:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Install shellcheck (macOS)
        if: runner.os == 'macOS'
        run: brew install shellcheck
      - name: Run shellcheck
        run: shellcheck hooks/scripts/scan-*.sh hooks/scripts/lib/*.sh scripts/doctor.sh

  integration:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Install scanners
        run: |
          # gitleaks
          GITLEAKS_VERSION=8.24.3
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" | tar xz -C /usr/local/bin gitleaks
          # shellcheck (pre-installed on ubuntu-latest, verify)
          shellcheck --version
      - name: Integration test — gitleaks detects staged secrets
        run: |
          cd "$(mktemp -d)"
          git init -q && git config user.email "ci@test" && git config user.name "CI"
          # gitleaks --staged needs at least one commit to diff against
          echo "init" > init.txt && git add init.txt && git commit -q -m "init"
          # Use a realistic private key pattern (full base64 block)
          cat > secret.txt << 'KEYEOF'
          -----BEGIN RSA PRIVATE KEY-----
          MIIEpAIBAAKCAQEA04up8hoqzS1+APIB0RhjXyObwHQnOzhAk4Aii7fISKERJXRT
          S5I7F5sDNtZfAC3sCFZ/RahQh/bVsJFeelNK4qDcnMXFIuJmJEa7IMMJ6MohLfny
          pcMRmpZ3TQx+c2PnW+lSANSlhMpuzYIWv0PTbK3PVOjfCSr1iB5SGHq+ydBHaYCH
          jR5JiU0MAigMBHmJumFgV/oE3OfJTZiz6nZZFjOakNq4Z3aHk/dTOPvvaQUxnwLA
          ye0NGHZ3HMIA25sjReF/AOX0/17HOEsMjNHt6pkd7xYiexKo9VJqMIK7/W5GJ9cM
          a2MkwRJSzVLNSGdjMVBGNoRt5w5TRGFMxXQS9QIDAQABAKCAQEAojx3VCzILEfV2
          -----END RSA PRIVATE KEY-----
          KEYEOF
          git add secret.txt
          OUTPUT=$(gitleaks protect --staged --no-banner 2>&1) || EXIT=$?
          if [ "${EXIT:-0}" -ne 1 ]; then
            echo "FAIL: gitleaks should have found the secret (exit=$EXIT)"
            echo "OUTPUT: $OUTPUT"
            exit 1
          fi
          echo "PASS: gitleaks detected staged secret"
      - name: Integration test — shellcheck detects issues in staged .sh
        run: |
          cd "$(mktemp -d)"
          git init -q && git config user.email "ci@test" && git config user.name "CI"
          printf '#!/bin/bash\necho $UNQUOTED_VAR\n' > bad.sh
          git add bad.sh
          git show ":bad.sh" > /tmp/bad.sh
          OUTPUT=$(shellcheck --format=json1 /tmp/bad.sh 2>&1) || true
          COUNT=$(echo "$OUTPUT" | python3 -c "import sys,json; print(len(json.load(sys.stdin).get('comments',[])))" 2>/dev/null)
          if [ "$COUNT" -lt 1 ]; then
            echo "FAIL: shellcheck should have found issues (count=$COUNT)"
            exit 1
          fi
          echo "PASS: shellcheck found $COUNT issue(s) — JSON parsing works"
      - name: Integration test — doctor.sh outputs valid JSON
        run: |
          OUTPUT=$(bash scripts/doctor.sh 2>/dev/null)
          echo "$OUTPUT" | python3 -m json.tool > /dev/null
          echo "PASS: doctor.sh JSON is valid"
          # Verify gitleaks shows as installed
          echo "$OUTPUT" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          assert d['gitleaks']['installed'] == True, 'gitleaks should be installed'
          assert d['shellcheck']['installed'] == True, 'shellcheck should be installed'
          print('PASS: doctor correctly detects installed scanners')
          "

  commitlint:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
      - run: npm install @commitlint/cli @commitlint/config-conventional
      - run: npx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }}
